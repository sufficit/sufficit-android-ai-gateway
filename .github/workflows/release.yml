name: Release APK

# Publica o APK debug nos Releases do GitHub quando uma tag v* e enviada.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK with tag
        id: apk
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          SRC=app/build/outputs/apk/debug/app-debug.apk
          OUT="sufficit-ai-gateway-${TAG}.apk"
          cp "$SRC" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sufficit-ai-gateway-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
